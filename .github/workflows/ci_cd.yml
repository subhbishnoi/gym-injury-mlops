name: Gym Injury MLOps Pipeline

on:
  push:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install fastapi uvicorn scikit-learn joblib numpy pandas pytest httpx jinja2 python-multipart
      - name: Train model
        run: python model/train_model.py
      - name: Run tests
        run: pytest tests/ -v